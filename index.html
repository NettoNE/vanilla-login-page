<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <main class="wrapper">
      <form class="form" action="">
        <div class="form__hero">
          <h1>Sign in</h1>

          <!-- https://www.svgrepo.com/svg/506725/login -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="50"
            height="50"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
        </div>
        <div class="field">
          <input
            class="field__input"
            type="email"
            id="id_email"
            placeholder="E-mail"
          />
          <label class="field__label" for="id_email">example@mail.com</label>
        </div>

        <div class="field">
          <input
            class="field__input"
            type="password"
            id="id_password"
            placeholder="Password"
          />
          <label class="field__label" for="id_password">password</label>
        </div>
        <button class="btn btn--login">Continue</button>
      </form>
    </main>
  </body>
</html>
